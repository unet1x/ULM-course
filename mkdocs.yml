site_name: Теория ULM/MAF → LAPL(A) или PPL(A)
site_description: ULM-first курс для Испании с последующим выбором LAPL(A) или PPL(A)
docs_dir: docs
site_dir: site
exclude_docs: |
  superpowers/

validation:
  links:
    anchors: warn

theme:
  name: material
  language: ru

plugins:
  - search:
      lang:
        - ru
        - en
        - es

nav:
  - Главная: index.md
  - Старт и лицензии:
      - Как учиться: 00-start/01-how-to-study.md
      - Дорожная карта MAF → LAPL(A) или PPL(A): 00-start/02-ulm-to-part-fcl-roadmap.md
      - Medical, школа и экзамены: 00-start/03-medical-training-exams.md
  - Воздушное право и Испания:
      - Нормативная система: 01-air-law/01-regulatory-system.md
      - Лицензия ULM и MAF: 01-air-law/02-ulm-licence-maf.md
      - Правила полётов: 01-air-law/03-rules-of-air.md
      - Воздушное пространство Испании: 01-air-law/04-airspace-spain.md
      - AIP, NOTAM и сообщения о событиях: 01-air-law/05-aip-notam-occurrence-reporting.md
      - Переход к LAPL(A) или PPL(A): 01-air-law/06-lapl-ppl-transition.md
  - Возможности и ограничения человека:
      - Физиология, гипоксия и CO: 02-human-performance/01-physiology.md
      - Зрение, слух и ориентация: 02-human-performance/02-vision-hearing-orientation.md
      - Стресс, усталость и лекарства: 02-human-performance/03-stress-fatigue-medication.md
      - Решения, TEM и коммуникация: 02-human-performance/04-adm-tem-communication.md
  - Метеорология:
      - Атмосфера, давление и температура: 03-meteorology/01-atmosphere-pressure-temperature.md
      - Ветер, побережье и горы: 03-meteorology/02-wind-turbulence-mountain-coast.md
      - Вода, облака и видимость: 03-meteorology/03-water-clouds-visibility.md
      - Воздушные массы и фронты: 03-meteorology/04-air-masses-fronts-systems.md
      - Грозы, обледенение и VFR2IMC: 03-meteorology/05-hazards-thunderstorm-icing.md
      - METAR, TAF, warnings и карты: 03-meteorology/06-metar-taf-sigmet-charts.md
      - Испанское решение go/no-go: 03-meteorology/07-spain-go-no-go.md
  - Связь и радиотелефония:
      - Основы радио и RTC: 04-communications/01-radio-basics-rtc.md
      - Структура сообщения и readback: 04-communications/02-message-structure.md
      - Вылет EN/ES: 04-communications/03-departure-en-es.md
      - Маршрут и прибытие EN/ES: 04-communications/04-enroute-arrival-en-es.md
      - Неконтролируемый аэродром и AFIS: 04-communications/05-uncontrolled-aerodrome.md
      - Срочность, бедствие и отказ связи: 04-communications/06-urgency-distress-radio-failure.md
  - Справочники:
      - Глоссарий: reference/glossary.md
      - Сокращения: reference/abbreviations.md
      - Карточки радиосвязи: reference/checklists-radio.md
  - Исследовательская база:
      - Реестр официальных источников: sources/official-sources.md
      - Испания и нормативная дата: sources/audit-spain-2026.md
      - Техническая карта: sources/audit-technical.md
      - Переход к LAPL(A): sources/audit-lapl-transition.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
