site_name: Теория ULM/MAF → LAPL(A) или PPL(A)
site_description: ULM-first курс для Испании с последующим выбором LAPL(A) или PPL(A)
docs_dir: docs
site_dir: site
exclude_docs: |
  superpowers/

validation:
  links:
    anchors: warn

theme:
  name: material
  language: ru

plugins:
  - search:
      lang:
        - ru
        - en
        - es

nav:
  - Главная: index.md
  - Справочники:
      - Глоссарий: reference/glossary.md
      - Сокращения: reference/abbreviations.md
  - Исследовательская база:
      - Реестр официальных источников: sources/official-sources.md
      - Испания и нормативная дата: sources/audit-spain-2026.md
      - Техническая карта: sources/audit-technical.md
      - Переход к LAPL(A): sources/audit-lapl-transition.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
