<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" role="img" aria-labelledby="forced-title forced-desc">
  <title id="forced-title">Приоритеты решения при необходимости посадки</title>
  <desc id="forced-desc">Учебная карта сначала сохраняет управление, энергию и достижимую область, затем разделяет вынужденную и предупредительную посадку по необходимости немедленной посадки и сохранённому времени. Связь и спасение относятся к обеим ветвям. Схема не содержит действий с органами управления.</desc>
  <defs>
    <marker id="arrow-forced" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="8" y="8" width="744" height="744" rx="24" fill="#f8fafc" stroke="#334155" stroke-width="4"/>
  <text x="380" y="66" text-anchor="middle" font-size="34px" font-weight="700" fill="#0f172a">Сначала сохранить варианты</text>

  <rect id="energy" x="40" y="92" width="200" height="82" rx="14" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/>
  <text x="140" y="126" text-anchor="middle" font-size="30px" fill="#0f172a">Управление</text>
  <text x="140" y="160" text-anchor="middle" font-size="30px" fill="#0f172a">и энергия</text>

  <rect id="landing-area" x="280" y="92" width="200" height="82" rx="14" fill="#dcfce7" stroke="#15803d" stroke-width="4"/>
  <text x="380" y="126" text-anchor="middle" font-size="30px" fill="#0f172a">Достижимая</text>
  <text x="380" y="160" text-anchor="middle" font-size="30px" fill="#0f172a">область</text>

  <rect id="occupants" x="520" y="92" width="200" height="82" rx="14" fill="#fef3c7" stroke="#b45309" stroke-width="4"/>
  <text x="620" y="126" text-anchor="middle" font-size="30px" fill="#0f172a">Люди и</text>
  <text x="620" y="160" text-anchor="middle" font-size="30px" fill="#0f172a">препятствия</text>

  <rect id="landing-decision" x="190" y="230" width="380" height="78" rx="14" fill="#fff7ed" stroke="#9a3412" stroke-width="4"/>
  <text x="380" y="262" text-anchor="middle" font-size="30px" fill="#7c2d12">Посадка необходима сейчас</text>
  <text x="380" y="296" text-anchor="middle" font-size="30px" fill="#7c2d12">или время ещё сохраняется?</text>

  <rect id="forced-branch" x="40" y="360" width="300" height="96" rx="16" fill="#fee2e2" stroke="#b91c1c" stroke-width="4"/>
  <text x="190" y="399" text-anchor="middle" font-size="30px" fill="#7f1d1d">Посадка необходима:</text>
  <text x="190" y="437" text-anchor="middle" font-size="30px" fill="#7f1d1d">вынужденная ветвь</text>

  <rect id="precautionary-branch" x="420" y="360" width="300" height="96" rx="16" fill="#ffedd5" stroke="#c2410c" stroke-width="4"/>
  <text x="570" y="399" text-anchor="middle" font-size="30px" fill="#7c2d12">Время и выбор есть:</text>
  <text x="570" y="437" text-anchor="middle" font-size="30px" fill="#7c2d12">предупредительная</text>

  <text x="380" y="505" text-anchor="middle" font-size="30px" font-weight="700" fill="#0f172a">ОБЕ ВЕТВИ — ПОСЛЕ УПРАВЛЕНИЯ</text>

  <rect id="communication" x="100" y="530" width="240" height="82" rx="14" fill="#e0e7ff" stroke="#4338ca" stroke-width="4"/>
  <text x="220" y="562" text-anchor="middle" font-size="30px" fill="#0f172a">Связь после</text>
  <text x="220" y="596" text-anchor="middle" font-size="30px" fill="#0f172a">управления</text>

  <rect id="rescue" x="420" y="530" width="240" height="82" rx="14" fill="#fae8ff" stroke="#a21caf" stroke-width="4"/>
  <text x="540" y="562" text-anchor="middle" font-size="30px" fill="#0f172a">Обнаружение</text>
  <text x="540" y="596" text-anchor="middle" font-size="30px" fill="#0f172a">и спасение</text>

  <line x1="240" y1="133" x2="280" y2="133" stroke="#334155" stroke-width="6" marker-end="url(#arrow-forced)" data-from="energy" data-to="landing-area"/>
  <line x1="480" y1="133" x2="520" y2="133" stroke="#334155" stroke-width="6" marker-end="url(#arrow-forced)" data-from="landing-area" data-to="occupants"/>
  <line x1="620" y1="174" x2="520" y2="230" stroke="#334155" stroke-width="6" marker-end="url(#arrow-forced)" data-from="occupants" data-to="landing-decision"/>
  <line x1="290" y1="308" x2="190" y2="360" stroke="#334155" stroke-width="6" marker-end="url(#arrow-forced)" data-from="landing-decision" data-to="forced-branch"/>
  <line x1="470" y1="308" x2="570" y2="360" stroke="#334155" stroke-width="6" marker-end="url(#arrow-forced)" data-from="landing-decision" data-to="precautionary-branch"/>

  <rect x="70" y="640" width="620" height="64" rx="14" fill="#e2e8f0" stroke="#475569" stroke-width="4"/>
  <text x="380" y="682" text-anchor="middle" font-size="30px" font-weight="700" fill="#0f172a">AFM/POH + CHECKLIST + TRAINING</text>
  <text x="380" y="738" text-anchor="middle" font-size="30px" font-weight="700" fill="#0f172a">КОНЦЕПТУАЛЬНО — НЕ ЧЕК-ЛИСТ</text>
</svg>
