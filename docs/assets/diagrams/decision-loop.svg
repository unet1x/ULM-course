<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="decision-title decision-desc">
  <title id="decision-title">Цикл авиационного решения внутри модели TEM</title>
  <desc id="decision-desc">Оригинальная концептуальная схема: предполётные IMSAFE и личные минимумы, затем факты и угрозы, понимание риска, варианты и путь отхода, решение, действие, контроль и повтор; TEM окружает цикл.</desc>
  <rect x="0" y="0" width="1200" height="820" fill="#f7fafc"/>
  <g id="tem-boundary">
    <rect x="25" y="82" width="1150" height="650" rx="26" fill="#eef2ff" stroke="#3c366b" stroke-width="5"/>
    <text x="600" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#312e5f">TEM: угроза → ошибка → нежелательное состояние → контрмера</text>
  </g>

  <g id="preflight-inputs">
    <rect x="140" y="18" width="920" height="50" rx="12" fill="#102a43"/>
    <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">ДО ПОЛЁТА: IMSAFE + личные минимумы + закон / AFM / школа</text>
  </g>

  <g id="facts-threats">
    <rect x="80" y="165" width="300" height="105" rx="16" fill="#d9e2ec" stroke="#334e68" stroke-width="3"/>
    <text x="230" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#102a43">1. Факты и угрозы</text>
    <text x="230" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#243b53">Наблюдение ≠ предположение</text>
  </g>
  <line x1="380" y1="218" x2="460" y2="218" stroke="#334e68" stroke-width="5"/>

  <g id="understand-risk">
    <rect x="460" y="165" width="280" height="105" rx="16" fill="#bee3f8" stroke="#2b6cb0" stroke-width="3"/>
    <text x="600" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1a365d">2. Понять риск</text>
    <text x="600" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1a365d">Куда он развивается?</text>
  </g>
  <line x1="740" y1="218" x2="820" y2="218" stroke="#334e68" stroke-width="5"/>

  <g id="options-escape">
    <rect x="820" y="165" width="300" height="105" rx="16" fill="#feebc8" stroke="#b7791f" stroke-width="3"/>
    <text x="970" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#744210">3. Варианты и уход</text>
    <text x="970" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#744210">Отмена — нормальный вариант</text>
  </g>
  <line x1="970" y1="270" x2="970" y2="345" stroke="#334e68" stroke-width="5"/>

  <g id="decision">
    <rect x="820" y="345" width="300" height="105" rx="16" fill="#fed7d7" stroke="#c53030" stroke-width="3"/>
    <text x="970" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#742a2a">4. Решение</text>
    <text x="970" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#742a2a">До нарушения триггера</text>
  </g>
  <line x1="820" y1="398" x2="740" y2="398" stroke="#334e68" stroke-width="5"/>

  <g id="action">
    <rect x="460" y="345" width="280" height="105" rx="16" fill="#c6f6d5" stroke="#2f855a" stroke-width="3"/>
    <text x="600" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#22543d">5. Действие</text>
    <text x="600" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#22543d">Aviate → Navigate → Communicate</text>
  </g>
  <line x1="460" y1="398" x2="380" y2="398" stroke="#334e68" stroke-width="5"/>

  <g id="monitor-repeat">
    <rect x="80" y="345" width="300" height="105" rx="16" fill="#e9d8fd" stroke="#6b46c1" stroke-width="3"/>
    <text x="230" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#44337a">6. Контроль и повтор</text>
    <text x="230" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#44337a">Результат? Новые факты?</text>
  </g>

  <path d="230 345 230 310 155 310 155 270" fill="none" stroke="#334e68" stroke-width="5"/>
  <text x="265" y="315" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#102a43">повторить цикл</text>

  <rect x="100" y="505" width="1000" height="160" rx="18" fill="#ffffff" stroke="#52606d" stroke-width="3"/>
  <text x="600" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#102a43">Три точки перехвата TEM</text>
  <text x="145" y="585" font-family="Arial, sans-serif" font-size="18" fill="#243b53">• предотвратить: изменить план до ошибки;</text>
  <text x="145" y="620" font-family="Arial, sans-serif" font-size="18" fill="#243b53">• перехватить: заметить отклонение и исправить;</text>
  <text x="645" y="585" font-family="Arial, sans-serif" font-size="18" fill="#243b53">• восстановить: сначала безопасная траектория;</text>
  <text x="645" y="620" font-family="Arial, sans-serif" font-size="18" fill="#243b53">• затем анализ причины и защита от повтора.</text>

  <rect x="105" y="752" width="990" height="48" rx="10" fill="#102a43"/>
  <text x="600" y="783" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">КОНЦЕПТУАЛЬНО: модель не заменяет закон, AFM/POH, чек-лист или инструктора</text>
</svg>
