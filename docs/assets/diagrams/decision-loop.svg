<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 1560" role="img" aria-labelledby="decision-title decision-desc">
  <title id="decision-title">Цикл авиационного решения внутри модели TEM</title>
  <desc id="decision-desc">Предполётные IMSAFE и личные минимумы питают вертикальный цикл: факты, риск, варианты, решение, действие, контроль и отдельная правая стрелка возврата к фактам; TEM окружает весь цикл.</desc>
  <defs>
    <marker id="decision-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="18" markerHeight="18" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 L 3 6 Z" fill="#334E68"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="1560" fill="#F8FAFC"/>

  <g id="preflight-inputs">
    <rect id="preflight-panel" x="25" y="20" width="450" height="158" rx="14" fill="#1E3A5F"/>
    <text x="250" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#FFFFFF">
      <tspan x="250" y="54">До полёта: входные ограничения</tspan>
      <tspan x="250" y="88" font-weight="400">IMSAFE: болезнь, лекарства, стресс,</tspan>
      <tspan x="250" y="117" font-weight="400">алкоголь, усталость, эмоции</tspan>
      <tspan x="250" y="146" font-weight="400">+ личные минимумы</tspan>
    </text>
  </g>

  <line x1="250" y1="178" x2="250" y2="217" stroke="#334E68" stroke-width="5" marker-end="url(#decision-arrow)"/>

  <g id="tem-boundary">
    <rect id="tem-outline" x="15" y="230" width="470" height="1055" rx="22" fill="#EEF2FF" stroke="#3C366B" stroke-width="4"/>
    <text x="250" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#312E5F">TEM окружает весь цикл решения</text>
  </g>

  <g id="facts-threats">
    <rect id="facts-panel" x="40" y="292" width="390" height="120" rx="14" fill="#E2E8F0" stroke="#334E68" stroke-width="3"/>
    <text x="235" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0F172A">
      <tspan x="235" y="330">1. Факты и угрозы</tspan>
      <tspan x="235" y="365" font-weight="400">наблюдение ≠ предположение</tspan>
      <tspan x="235" y="394" font-weight="400">что изменилось?</tspan>
    </text>
  </g>

  <line x1="235" y1="412" x2="235" y2="443" stroke="#334E68" stroke-width="5" marker-end="url(#decision-arrow)"/>

  <g id="understand-risk">
    <rect id="risk-panel" x="40" y="456" width="390" height="120" rx="14" fill="#DCEEFF" stroke="#2B6CB0" stroke-width="3"/>
    <text x="235" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#1A365D">
      <tspan x="235" y="494">2. Понять риск</tspan>
      <tspan x="235" y="529" font-weight="400">улучшается, стабилен</tspan>
      <tspan x="235" y="558" font-weight="400">или ухудшается?</tspan>
    </text>
  </g>

  <line x1="235" y1="576" x2="235" y2="607" stroke="#334E68" stroke-width="5" marker-end="url(#decision-arrow)"/>

  <g id="options-escape">
    <rect id="options-panel" x="40" y="620" width="390" height="120" rx="14" fill="#FFF0D5" stroke="#9A5B13" stroke-width="3"/>
    <text x="235" y="658" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#653B0B">
      <tspan x="235" y="658">3. Варианты и путь отхода</tspan>
      <tspan x="235" y="693" font-weight="400">отмена, возврат и посадка —</tspan>
      <tspan x="235" y="722" font-weight="400">нормальные варианты</tspan>
    </text>
  </g>

  <line x1="235" y1="740" x2="235" y2="771" stroke="#334E68" stroke-width="5" marker-end="url(#decision-arrow)"/>

  <g id="decision">
    <rect id="decision-panel" x="40" y="784" width="390" height="120" rx="14" fill="#FFE3E3" stroke="#C53030" stroke-width="3"/>
    <text x="235" y="822" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#742A2A">
      <tspan x="235" y="822">4. Решение</tspan>
      <tspan x="235" y="857" font-weight="400">действуйте до нарушения</tspan>
      <tspan x="235" y="886" font-weight="400">заданного триггера</tspan>
    </text>
  </g>

  <line x1="235" y1="904" x2="235" y2="935" stroke="#334E68" stroke-width="5" marker-end="url(#decision-arrow)"/>

  <g id="action">
    <rect id="action-panel" x="40" y="948" width="390" height="120" rx="14" fill="#DDF5E5" stroke="#2F855A" stroke-width="3"/>
    <text x="235" y="986" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#22543D">
      <tspan x="235" y="986">5. Действие</tspan>
      <tspan x="235" y="1021" font-weight="400">управлять → навигация →</tspan>
      <tspan x="235" y="1050" font-weight="400">связь</tspan>
    </text>
  </g>

  <line x1="235" y1="1068" x2="235" y2="1099" stroke="#334E68" stroke-width="5" marker-end="url(#decision-arrow)"/>

  <g id="monitor-repeat">
    <rect id="monitor-panel" x="40" y="1112" width="390" height="120" rx="14" fill="#EEE4FF" stroke="#6B46C1" stroke-width="3"/>
    <text x="235" y="1150" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#44337A">
      <tspan x="235" y="1150">6. Контроль и повтор</tspan>
      <tspan x="235" y="1185" font-weight="400">проверьте результат;</tspan>
      <tspan x="235" y="1214" font-weight="400">соберите новые факты</tspan>
    </text>
  </g>

  <path id="return-path" d="M 430 1172 L 465 1172 L 465 352 L 430 352" fill="none" stroke="#334E68" stroke-width="5" stroke-linejoin="round" marker-end="url(#decision-arrow)"/>

  <g id="tem-intercepts">
    <rect id="intercepts-panel" x="25" y="1310" width="450" height="142" rx="14" fill="#FFFFFF" stroke="#52606D" stroke-width="3"/>
    <text x="250" y="1345" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0F172A">
      <tspan x="250" y="1345">Точки перехвата TEM</tspan>
      <tspan x="250" y="1380" font-weight="400">предотвратить угрозу →</tspan>
      <tspan x="250" y="1409" font-weight="400">перехватить ошибку → восстановить</tspan>
      <tspan x="250" y="1438" font-weight="400">безопасное состояние</tspan>
    </text>
  </g>

  <g id="model-disclaimer">
    <rect id="model-note-panel" x="25" y="1476" width="450" height="70" rx="10" fill="#1E3A5F"/>
    <text x="250" y="1506" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#FFFFFF">
      <tspan x="250" y="1506">Не заменяет закон, AFM/POH</tspan>
      <tspan x="250" y="1533">или чек-лист</tspan>
    </text>
  </g>
</svg>
