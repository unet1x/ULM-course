<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Концептуальная диаграмма скорость — коэффициент перегрузки</title>
  <desc id="desc">Безразмерная V-n схема показывает положительную и отрицательную границы, условную порывную границу и оси; конкретные пределы и скорости отсутствуют.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="18" markerHeight="18" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L10 5 L0 10 z" fill="context-stroke"/></marker></defs>
  <rect width="720" height="520" fill="#f8fafc"/>
  <text x="360" y="38" text-anchor="middle" font-size="30" font-family="sans-serif" font-weight="700" fill="#991b1b">КОНЦЕПТУАЛЬНО — НЕ ДЛЯ ПОЛЁТА</text>
  <line id="speed-axis" x1="105" y1="330" x2="655" y2="330" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <line id="load-axis" x1="105" y1="440" x2="105" y2="78" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <line id="one-g-line" x1="105" y1="260" x2="610" y2="260" stroke="#64748b" stroke-width="3" stroke-dasharray="10 9"/>
  <text x="120" y="250" font-size="30" font-family="sans-serif" fill="#475569">n = 1</text>
  <text x="690" y="320" text-anchor="end" font-size="30" font-family="sans-serif" fill="#111827">V</text>
  <text x="40" y="260" font-size="30" font-family="sans-serif" fill="#111827" transform="rotate(-90 40 260)">перегрузка n</text>
  <line x1="92" y1="190" x2="118" y2="190" stroke="#111827" stroke-width="4"/>
  <text x="62" y="200" font-size="30" font-family="sans-serif" fill="#047857">+</text>
  <line x1="92" y1="415" x2="118" y2="415" stroke="#111827" stroke-width="4"/>
  <text x="62" y="425" font-size="30" font-family="sans-serif" fill="#b91c1c">−</text>
  <path id="positive-boundary" d="M150 330 C185 245 220 190 300 125 L565 125 L610 205" fill="none" stroke="#047857" stroke-width="8"/>
  <path id="negative-boundary" d="M150 330 C205 370 245 405 325 425 L560 425 L610 360" fill="none" stroke="#dc2626" stroke-width="8"/>
  <path id="gust-boundary" data-reference="one-g-line" d="M150 260 L550 145 L550 380 Z" fill="none" stroke="#7c3aed" stroke-width="6" stroke-dasharray="12 9"/>
  <line id="speed-boundary" x1="610" y1="205" x2="610" y2="360" stroke="#b45309" stroke-width="7"/>
  <text x="305" y="105" font-size="30" font-family="sans-serif" fill="#047857">условная +граница</text>
  <text x="315" y="465" font-size="30" font-family="sans-serif" fill="#b91c1c">условная −граница</text>
  <text x="430" y="240" text-anchor="middle" font-size="30" font-family="sans-serif" fill="#6d28d9">порыв</text>
  <text x="690" y="500" text-anchor="end" font-size="30" font-family="sans-serif" fill="#475569">не типовая: значения — только AFM/POH</text>
</svg>
