<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 920" role="img" aria-labelledby="mass-balance-title mass-balance-desc">
  <title id="mass-balance-title">Плечи, моменты и допустимая область центровки</title>
  <desc id="mass-balance-desc">Верхняя панель показывает условный самолёт, начало отсчёта и плечи элементов. Нижняя панель показывает вымышленный конверт массы и центра тяжести с точками вылета и посадки. Все данные учебные.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 4 L0 8 Z" fill="#155e75"/>
    </marker>
  </defs>
  <rect x="12" y="12" width="736" height="896" rx="20" fill="#f8fafc" stroke="#0f172a" stroke-width="4"/>
  <text x="380" y="52" text-anchor="middle" font-size="34px" font-family="sans-serif" font-weight="700" fill="#0f172a">Масса и центровка</text>
  <text x="380" y="88" text-anchor="middle" font-size="30px" font-family="sans-serif" fill="#991b1b">УЧЕБНАЯ СХЕМА — НЕ ДЛЯ ПОЛЁТА</text>

  <g id="aircraft-geometry">
    <rect x="36" y="118" width="688" height="300" rx="16" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
    <path d="M120 275 L630 275 L690 235 L718 275 L690 315 L630 275" fill="none" stroke="#0f172a" stroke-width="7"/>
    <ellipse cx="340" cy="275" rx="98" ry="56" fill="#bae6fd" stroke="#0369a1" stroke-width="4"/>
    <line id="datum" x1="92" y1="145" x2="92" y2="382" stroke="#b91c1c" stroke-width="6"/>
    <text x="104" y="168" font-size="30px" font-family="sans-serif" fill="#7f1d1d">Начало отсчёта</text>

    <circle cx="250" cy="275" r="15" fill="#f59e0b" stroke="#92400e" stroke-width="3"/>
    <circle cx="390" cy="275" r="15" fill="#10b981" stroke="#065f46" stroke-width="3"/>
    <circle cx="585" cy="275" r="15" fill="#8b5cf6" stroke="#5b21b6" stroke-width="3"/>
    <g id="arm-lines" fill="none" stroke="#155e75" stroke-width="4" marker-end="url(#arrow)">
      <line x1="92" y1="205" x2="250" y2="205"/>
      <line x1="92" y1="345" x2="390" y2="345"/>
      <line x1="92" y1="390" x2="585" y2="390"/>
    </g>
    <text x="171" y="196" text-anchor="middle" font-size="30px" font-family="sans-serif" fill="#164e63">плечо a₁</text>
    <text x="245" y="338" text-anchor="middle" font-size="30px" font-family="sans-serif" fill="#164e63">плечо a₂</text>
    <text x="410" y="383" text-anchor="middle" font-size="30px" font-family="sans-serif" fill="#164e63">плечо a₃</text>
    <g id="moments">
      <path d="M215 245 A50 50 0 0 1 274 231" fill="none" stroke="#92400e" stroke-width="4" marker-end="url(#arrow)"/>
      <path d="M356 245 A50 50 0 0 1 415 231" fill="none" stroke="#065f46" stroke-width="4" marker-end="url(#arrow)"/>
      <path d="M550 245 A50 50 0 0 1 609 231" fill="none" stroke="#5b21b6" stroke-width="4" marker-end="url(#arrow)"/>
    </g>
  </g>

  <g id="cg-envelope">
    <rect x="36" y="446" width="688" height="390" rx="16" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
    <text x="380" y="486" text-anchor="middle" font-size="32px" font-family="sans-serif" font-weight="700" fill="#7c2d12">Вымышленный конверт</text>
    <line x1="115" y1="760" x2="675" y2="760" stroke="#0f172a" stroke-width="4"/>
    <line x1="115" y1="760" x2="115" y2="525" stroke="#0f172a" stroke-width="4"/>
    <text x="390" y="810" text-anchor="middle" font-size="30px" font-family="sans-serif" fill="#0f172a">Положение CG →</text>
    <text x="72" y="650" text-anchor="middle" font-size="30px" font-family="sans-serif" fill="#0f172a" transform="rotate(-90 72 650)">Масса →</text>
    <polygon points="200,720 240,560 580,540 620,720" fill="#bbf7d0" stroke="#15803d" stroke-width="5"/>
    <line x1="200" y1="720" x2="620" y2="720" stroke="#166534" stroke-width="3"/>
    <line x1="240" y1="560" x2="580" y2="540" stroke="#166534" stroke-width="3"/>
    <circle id="departure-point" cx="430" cy="585" r="15" fill="#dc2626" stroke="#7f1d1d" stroke-width="4"/>
    <circle id="landing-point" cx="345" cy="640" r="15" fill="#2563eb" stroke="#1e3a8a" stroke-width="4"/>
    <text x="455" y="575" font-size="30px" font-family="sans-serif" fill="#7f1d1d">вылет</text>
    <text x="370" y="682" font-size="30px" font-family="sans-serif" fill="#1e3a8a">посадка</text>
    <text x="390" y="740" text-anchor="middle" font-size="30px" font-family="sans-serif" fill="#166534">допустимая область</text>
  </g>

  <text x="380" y="876" text-anchor="middle" font-size="30px" font-family="sans-serif" fill="#334155">Проверяются масса и CG каждой фазы</text>
</svg>
