<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Качественные составляющие сопротивления</title>
  <desc id="desc">График без числового масштаба показывает уменьшение induced drag со скоростью, рост parasite drag и U-образную сумму.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="18" markerHeight="18" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L10 5 L0 10 z" fill="context-stroke"/></marker></defs>
  <rect width="720" height="520" fill="#f8fafc"/>
  <text x="360" y="38" text-anchor="middle" font-size="30" font-family="sans-serif" font-weight="700" fill="#102a43">КОНЦЕПТУАЛЬНО — НЕ ДЛЯ ПОЛЁТА</text>
  <line x1="105" y1="435" x2="650" y2="435" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="105" y1="435" x2="105" y2="80" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>
  <text id="speed-label" x="690" y="485" text-anchor="end" font-size="30" font-family="sans-serif" fill="#111827">воздушная скорость</text>
  <text x="35" y="255" font-size="30" font-family="sans-serif" fill="#111827" transform="rotate(-90 35 255)">сопротивление</text>
  <polyline id="induced-curve" points="145,115 220,210 300,290 380,345 460,380 540,400 610,410" fill="none" stroke="#7c3aed" stroke-width="8"/>
  <text x="122" y="95" font-size="30" font-family="sans-serif" fill="#6d28d9">индуктивное</text>
  <polyline id="parasite-curve" points="145,410 220,400 300,375 380,330 460,260 540,170 610,110" fill="none" stroke="#dc2626" stroke-width="8"/>
  <text x="430" y="92" font-size="30" font-family="sans-serif" fill="#b91c1c">паразитное</text>
  <polyline id="total-curve" points="145,90 220,175 300,230 380,240 460,205 540,135 610,85" fill="none" stroke="#047857" stroke-width="9"/>
  <text x="405" y="195" font-size="30" font-family="sans-serif" fill="#047857">суммарное</text>
  <line id="qualitative-minimum" x1="380" y1="240" x2="380" y2="435" stroke="#0f766e" stroke-width="4" stroke-dasharray="10 8"/>
  <line id="no-scale-tick" x1="370" y1="435" x2="390" y2="435" stroke="#0f766e" stroke-width="5"/>
  <text x="145" y="485" font-size="30" font-family="sans-serif" fill="#475569">без шкалы</text>
</svg>
