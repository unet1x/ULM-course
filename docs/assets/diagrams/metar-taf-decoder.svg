<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="decoder-title decoder-desc" viewBox="0 0 500 1260">
  <title id="decoder-title">Декодер наблюдения, прогноза и change groups</title>
  <desc id="decoder-desc">Учебная вертикальная схема разделяет METAR или SPECI как наблюдение, TAF как прогноз и временные группы изменений. Все строки синтетические и не являются текущей погодой.</desc>
  <defs>
    <marker id="decoder-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 L 3 6 Z" fill="#1E3A5F"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="1260" fill="#F8FAFC"/>
  <text x="250" y="45" text-anchor="middle" font-size="25" font-weight="700" fill="#0F172A">SOURCE → TIME → PLACE → LIMIT</text>

  <g id="observation">
    <rect x="22" y="85" width="456" height="255" rx="20" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="4"/>
    <text x="250" y="130" text-anchor="middle" font-size="25" font-weight="700" fill="#1E3A5F">OBSERVATION</text>
    <text x="250" y="172" text-anchor="middle" font-size="22" fill="#0F172A">
      <tspan x="250" dy="0">METAR / SPECI</tspan>
      <tspan x="250" dy="34">station + observed time</tspan>
      <tspan x="250" dy="34">wind · visibility · weather</tspan>
      <tspan x="250" dy="34">cloud · T/Td · QNH · TREND</tspan>
    </text>
  </g>
  <line x1="250" y1="340" x2="250" y2="395" stroke="#1E3A5F" stroke-width="5" marker-end="url(#decoder-arrow)"/>

  <g id="forecast">
    <rect x="22" y="410" width="456" height="255" rx="20" fill="#F0FDF4" stroke="#15803D" stroke-width="4"/>
    <text x="250" y="455" text-anchor="middle" font-size="25" font-weight="700" fill="#166534">FORECAST</text>
    <text x="250" y="497" text-anchor="middle" font-size="22" fill="#0F172A">
      <tspan x="250" dy="0">TAF + validity period</tspan>
      <tspan x="250" dy="34">prevailing group</tspan>
      <tspan x="250" dy="34">not a promise</tspan>
      <tspan x="250" dy="34">not route weather</tspan>
    </text>
  </g>
  <line x1="250" y1="665" x2="250" y2="720" stroke="#1E3A5F" stroke-width="5" marker-end="url(#decoder-arrow)"/>

  <g id="change-groups">
    <rect x="22" y="735" width="456" height="270" rx="20" fill="#FFF7ED" stroke="#C2410C" stroke-width="4"/>
    <text x="250" y="780" text-anchor="middle" font-size="25" font-weight="700" fill="#9A3412">CHANGE GROUPS</text>
    <text x="250" y="822" text-anchor="middle" font-size="22" fill="#0F172A">
      <tspan x="250" dy="0">FM = new prevailing</tspan>
      <tspan x="250" dy="34">BECMG = transition</tspan>
      <tspan x="250" dy="34">TEMPO = temporary</tspan>
      <tspan x="250" dy="34">PROB30/40 = probability</tspan>
      <tspan x="250" dy="34">AMD ≠ COR</tspan>
    </text>
  </g>

  <g id="not-live-weather">
    <rect x="22" y="1045" width="456" height="180" rx="20" fill="#FEF2F2" stroke="#B91C1C" stroke-width="4"/>
    <text x="250" y="1095" text-anchor="middle" font-size="25" font-weight="700" fill="#991B1B">НЕ ТЕКУЩАЯ ПОГОДА</text>
    <text x="250" y="1138" text-anchor="middle" font-size="21" fill="#0F172A">
      <tspan x="250" dy="0">Synthetic structure only.</tspan>
      <tspan x="250" dy="34">Refresh AEMET/AIP/AMA.</tspan>
    </text>
  </g>
</svg>
