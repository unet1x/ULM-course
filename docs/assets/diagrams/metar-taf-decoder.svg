<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="decoder-title decoder-desc" viewBox="0 0 600 1050">
  <title id="decoder-title">Наблюдение и прогноз как параллельные продукты</title>
  <desc id="decoder-desc">Слева показаны METAR или SPECI с вложенным TREND, справа — TAF с вложенными группами изменений. Панели параллельны и не образуют последовательность. Схема не является текущей погодой.</desc>
  <rect x="0" y="0" width="600" height="1050" fill="#F8FAFC"/>
  <text x="300" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#0F172A">ИСТОЧНИК → ВРЕМЯ → МЕСТО</text>
  <text x="300" y="80" text-anchor="middle" font-size="26" fill="#334155">
    <tspan x="300" dy="0">наблюдение и прогноз</tspan>
    <tspan x="300" dy="32">проверяются параллельно</tspan>
  </text>

  <g id="observation">
    <rect x="20" y="115" width="270" height="650" rx="20" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="4"/>
    <text x="155" y="160" text-anchor="middle" font-size="28" font-weight="700" fill="#1E3A5F">НАБЛЮДЕНИЕ</text>
    <text x="155" y="205" text-anchor="middle" font-size="26" fill="#0F172A">
      <tspan x="155" dy="0">METAR / SPECI</tspan>
      <tspan x="155" dy="36">станция</tspan>
      <tspan x="155" dy="36">время наблюдения</tspan>
      <tspan x="155" dy="36">ветер · видимость</tspan>
      <tspan x="155" dy="36">явления · облака</tspan>
      <tspan x="155" dy="36">T/Td · QNH</tspan>
    </text>

    <g id="trend">
      <rect x="45" y="485" width="220" height="225" rx="16" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="3"/>
      <text x="155" y="528" text-anchor="middle" font-size="28" font-weight="700" fill="#1E3A5F">TREND</text>
      <text x="155" y="570" text-anchor="middle" font-size="26" fill="#0F172A">
        <tspan x="155" dy="0">присоединённый</tspan>
        <tspan x="155" dy="34">краткий прогноз</tspan>
        <tspan x="155" dy="34">со своим периодом</tspan>
        <tspan x="155" dy="34">не гарантия</tspan>
      </text>
    </g>
  </g>

  <g id="forecast">
    <rect x="310" y="115" width="270" height="650" rx="20" fill="#F0FDF4" stroke="#15803D" stroke-width="4"/>
    <text x="445" y="160" text-anchor="middle" font-size="28" font-weight="700" fill="#166534">ПРОГНОЗ</text>
    <text x="445" y="205" text-anchor="middle" font-size="26" fill="#0F172A">
      <tspan x="445" dy="0">TAF</tspan>
      <tspan x="445" dy="36">аэродром</tspan>
      <tspan x="445" dy="36">период действия</tspan>
      <tspan x="445" dy="36">преобладающая</tspan>
      <tspan x="445" dy="36">группа</tspan>
      <tspan x="445" dy="36">не обещание</tspan>
    </text>

    <g id="change-groups">
      <rect x="325" y="410" width="240" height="320" rx="16" fill="#FFF7ED" stroke="#C2410C" stroke-width="3"/>
      <text x="445" y="450" text-anchor="middle" font-size="26" font-weight="700" fill="#9A3412">
        <tspan x="445" dy="0">ГРУППЫ</tspan>
        <tspan x="445" dy="31">ИЗМЕНЕНИЙ</tspan>
      </text>
      <text x="445" y="520" text-anchor="middle" font-size="25" fill="#0F172A">
        <tspan x="445" dy="0">FM — новый</tspan>
        <tspan x="445" dy="27">BECMG —</tspan>
        <tspan x="445" dy="27">переход</tspan>
        <tspan x="445" dy="27">TEMPO —</tspan>
        <tspan x="445" dy="27">временно</tspan>
        <tspan x="445" dy="27">PROB —</tspan>
        <tspan x="445" dy="27">вероятность</tspan>
        <tspan x="445" dy="27">AMD ≠ COR</tspan>
      </text>
    </g>
  </g>

  <g id="not-live-weather">
    <rect x="20" y="805" width="560" height="200" rx="20" fill="#FEF2F2" stroke="#B91C1C" stroke-width="4"/>
    <text x="300" y="855" text-anchor="middle" font-size="30" font-weight="700" fill="#991B1B">НЕ ТЕКУЩАЯ ПОГОДА</text>
    <text x="300" y="902" text-anchor="middle" font-size="26" fill="#0F172A">
      <tspan x="300" dy="0">Это только структура продукта.</tspan>
      <tspan x="300" dy="36">Перед полётом заново получите</tspan>
      <tspan x="300" dy="36">текущие AEMET / AIP / AMA.</tspan>
    </text>
  </g>
</svg>
