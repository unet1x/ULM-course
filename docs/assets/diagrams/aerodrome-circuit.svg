<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" role="img" aria-labelledby="circuit-title circuit-desc">
  <title id="circuit-title">Концептуальные участки аэродромного круга</title>
  <desc id="circuit-desc">Пять названных участков образуют замкнутую учебную схему вокруг условной полосы. Отдельно показаны lookout, следовая турбулентность, уход на второй круг и предупреждение о текущих AD/VAC.</desc>
  <defs>
    <marker id="arrow-circuit" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#164e63"/>
    </marker>
  </defs>
  <rect x="8" y="8" width="744" height="744" rx="24" fill="#f8fafc" stroke="#334155" stroke-width="4"/>
  <rect x="250" y="322" width="260" height="100" rx="10" fill="#cbd5e1" stroke="#475569" stroke-width="4"/>
  <line x1="270" y1="372" x2="490" y2="372" stroke="#ffffff" stroke-width="8" stroke-dasharray="22 18"/>

  <rect id="upwind-leg" x="470" y="340" width="170" height="64" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/>
  <text x="555" y="381" text-anchor="middle" font-size="30px" fill="#0f172a">Вылет</text>

  <rect id="crosswind-leg" x="470" y="220" width="170" height="64" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/>
  <text x="555" y="261" text-anchor="middle" font-size="30px" fill="#0f172a">Боковой</text>

  <rect id="downwind-leg" x="160" y="100" width="250" height="64" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/>
  <text x="285" y="141" text-anchor="middle" font-size="30px" fill="#0f172a">Попутный ветер</text>

  <rect id="base-leg" x="40" y="220" width="170" height="64" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/>
  <text x="125" y="261" text-anchor="middle" font-size="30px" fill="#0f172a">Базовый</text>

  <rect id="final-leg" x="40" y="340" width="170" height="64" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/>
  <text x="125" y="381" text-anchor="middle" font-size="30px" fill="#0f172a">Конечный</text>

  <line x1="555" y1="340" x2="555" y2="284" stroke="#164e63" stroke-width="6" marker-end="url(#arrow-circuit)" data-from="upwind-leg" data-to="crosswind-leg"/>
  <line x1="470" y1="220" x2="410" y2="164" stroke="#164e63" stroke-width="6" marker-end="url(#arrow-circuit)" data-from="crosswind-leg" data-to="downwind-leg"/>
  <line x1="160" y1="164" x2="125" y2="220" stroke="#164e63" stroke-width="6" marker-end="url(#arrow-circuit)" data-from="downwind-leg" data-to="base-leg"/>
  <line x1="125" y1="284" x2="125" y2="340" stroke="#164e63" stroke-width="6" marker-end="url(#arrow-circuit)" data-from="base-leg" data-to="final-leg"/>
  <line x1="210" y1="372" x2="470" y2="372" stroke="#164e63" stroke-width="6" marker-end="url(#arrow-circuit)" data-from="final-leg" data-to="upwind-leg"/>

  <circle id="lookout" cx="90" cy="500" r="55" fill="#dcfce7" stroke="#15803d" stroke-width="4"/>
  <text x="90" y="510" text-anchor="middle" font-size="30px" fill="#14532d">ОБЗОР</text>

  <ellipse id="wake" cx="255" cy="500" rx="75" ry="42" fill="#fef3c7" stroke="#b45309" stroke-width="4"/>
  <text x="255" y="510" text-anchor="middle" font-size="30px" fill="#78350f">СЛЕД</text>

  <rect id="go-around" x="440" y="470" width="280" height="70" rx="14" fill="#fee2e2" stroke="#b91c1c" stroke-width="4"/>
  <text x="580" y="514" text-anchor="middle" font-size="30px" fill="#7f1d1d">УХОД — ВАРИАНТ</text>

  <rect id="local-data-warning" x="30" y="590" width="700" height="110" rx="16" fill="#fff7ed" stroke="#c2410c" stroke-width="4"/>
  <text x="380" y="632" text-anchor="middle" font-size="30px" font-weight="700" fill="#7c2d12">ТЕКУЩИЕ AD/VAC и SERA задают направление,</text>
  <text x="380" y="670" text-anchor="middle" font-size="30px" font-weight="700" fill="#7c2d12">высоту и местную схему</text>

  <text x="380" y="735" text-anchor="middle" font-size="30px" font-weight="700" fill="#0f172a">КОНЦЕПТУАЛЬНО — НЕ ЧЕК-ЛИСТ</text>
</svg>
