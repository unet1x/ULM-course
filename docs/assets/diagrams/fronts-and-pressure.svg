<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fronts-title fronts-desc" viewBox="0 0 600 1050">
  <title id="fronts-title">Сравнение концептуальных моделей тёплого и холодного фронтов</title>
  <desc id="fronts-desc">Две отдельные учебные панели показывают пологий подъём тёплого фронта и более крутой подъём холодного фронта. Ниже показаны общие идеи низкого и высокого давления. Схема не является прогнозом.</desc>
  <defs>
    <marker id="front-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 L 3 6 Z" fill="#1E3A5F"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="600" height="1050" fill="#F8FAFC"/>
  <text x="300" y="42" text-anchor="middle" font-size="30" font-weight="700" fill="#0F172A">
    <tspan x="300" dy="0">ТЁПЛЫЙ И ХОЛОДНЫЙ</tspan>
    <tspan x="300" dy="36">ФРОНТЫ: СРАВНЕНИЕ</tspan>
  </text>
  <text x="300" y="118" text-anchor="middle" font-size="26" fill="#334155">концептуальная учебная схема</text>

  <g id="conceptual-front">
    <g id="warm-front-panel">
      <rect x="20" y="150" width="270" height="360" rx="18" fill="#FFF7ED" stroke="#C2410C" stroke-width="4"/>
      <text x="155" y="184" text-anchor="middle" font-size="26" font-weight="700" fill="#7C2D12">
        <tspan x="155" dy="0">ТЁПЛЫЙ</tspan>
        <tspan x="155" dy="31">ФРОНТ</tspan>
      </text>
      <line x1="45" y1="430" x2="265" y2="430" stroke="#475569" stroke-width="4"/>
      <path d="M 45 420 L 255 270 L 265 420 Z" fill="#FDE68A" stroke="#B45309" stroke-width="3"/>
      <path d="M 45 420 L 118 360 L 155 420 Z" fill="#BFDBFE" stroke="#1D4ED8" stroke-width="3"/>
      <line x1="145" y1="360" x2="218" y2="305" stroke="#1E3A5F" stroke-width="4" marker-end="url(#front-arrow)"/>
      <text x="155" y="462" text-anchor="middle" font-size="26" fill="#0F172A">
        <tspan x="155" dy="0">пологий подъём</tspan>
        <tspan x="155" dy="32">широкая зона</tspan>
      </text>
    </g>

    <g id="cold-front-panel">
      <rect x="310" y="150" width="270" height="360" rx="18" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="4"/>
      <text x="445" y="184" text-anchor="middle" font-size="26" font-weight="700" fill="#1E3A5F">
        <tspan x="445" dy="0">ХОЛОДНЫЙ</tspan>
        <tspan x="445" dy="31">ФРОНТ</tspan>
      </text>
      <line x1="335" y1="430" x2="555" y2="430" stroke="#475569" stroke-width="4"/>
      <path d="M 335 420 L 420 275 L 470 420 Z" fill="#BFDBFE" stroke="#1D4ED8" stroke-width="3"/>
      <path d="M 470 420 L 555 350 L 555 420 Z" fill="#FDE68A" stroke="#B45309" stroke-width="3"/>
      <line x1="405" y1="365" x2="435" y2="300" stroke="#1E3A5F" stroke-width="4" marker-end="url(#front-arrow)"/>
      <text x="445" y="462" text-anchor="middle" font-size="26" fill="#0F172A">
        <tspan x="445" dy="0">более крутой подъём</tspan>
        <tspan x="445" dy="32">узкая активная зона</tspan>
      </text>
    </g>
  </g>

  <g id="conceptual-low">
    <rect x="20" y="545" width="270" height="245" rx="18" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="4"/>
    <text x="155" y="580" text-anchor="middle" font-size="26" font-weight="700" fill="#1E3A5F">
      <tspan x="155" dy="0">НИЗКОЕ</tspan>
      <tspan x="155" dy="31">ДАВЛЕНИЕ</tspan>
    </text>
    <text x="155" y="650" text-anchor="middle" font-size="26" fill="#0F172A">
      <tspan x="155" dy="0">сходимость</tspan>
      <tspan x="155" dy="34">подъём вероятнее</tspan>
      <tspan x="155" dy="34">облака возможны</tspan>
    </text>
    <line x1="65" y1="765" x2="105" y2="738" stroke="#1E3A5F" stroke-width="4" marker-end="url(#front-arrow)"/>
    <line x1="245" y1="765" x2="205" y2="738" stroke="#1E3A5F" stroke-width="4" marker-end="url(#front-arrow)"/>
  </g>

  <g id="conceptual-high">
    <rect x="310" y="545" width="270" height="245" rx="18" fill="#FFF7ED" stroke="#C2410C" stroke-width="4"/>
    <text x="445" y="580" text-anchor="middle" font-size="26" font-weight="700" fill="#7C2D12">
      <tspan x="445" dy="0">ВЫСОКОЕ</tspan>
      <tspan x="445" dy="31">ДАВЛЕНИЕ</tspan>
    </text>
    <text x="445" y="650" text-anchor="middle" font-size="26" fill="#0F172A">
      <tspan x="445" dy="0">опускание воздуха</tspan>
      <tspan x="445" dy="34">инверсия возможна</tspan>
      <tspan x="445" dy="34">дымка может остаться</tspan>
    </text>
    <line x1="445" y1="738" x2="445" y2="770" stroke="#7C2D12" stroke-width="4" marker-end="url(#front-arrow)"/>
  </g>

  <g id="forecast-warning">
    <rect x="20" y="830" width="560" height="185" rx="18" fill="#FEF2F2" stroke="#B91C1C" stroke-width="4"/>
    <text x="300" y="878" text-anchor="middle" font-size="30" font-weight="700" fill="#991B1B">ЭТО НЕ ПРОГНОЗ</text>
    <text x="300" y="924" text-anchor="middle" font-size="26" fill="#0F172A">
      <tspan x="300" dy="0">Схема объясняет различия моделей.</tspan>
      <tspan x="300" dy="34">Место, время и интенсивность</tspan>
      <tspan x="300" dy="34">берутся из текущих продуктов.</tspan>
    </text>
  </g>
</svg>
